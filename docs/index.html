<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <link rel="stylesheet" href="/theme.css" />
    <link rel="stylesheet" href="/antd.min.css" />
    <link rel="stylesheet" href="/components/dist/components.css" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="/init.js"></script>
    <script>
      window.$docsify = {
        loadNavbar: true,
        loadSidebar: true,
        autoHeader: true,
        subMaxLevel: 3,
        auto2top: true,
        topMargin: 50,
        plugins: [
          function (hook, vm) {
            hook.mounted(function () {
              const main = document.querySelector('main');
              const sidebar = main.querySelector('main > aside');
              sidebar.setAttribute('role', 'complementary');
              sidebar.setAttribute('aria-label', 'Documentation Navigation');
              main.setAttribute('role', 'main');
              main.setAttribute('aria-label', 'Main Documentation Content');
            });
          },
        ],
      };
    </script>
    <script src="/vue.global.js"></script>
    <script src="/dayjs.min.js"></script>
    <script src="/antd.min.js"></script>
    <script src="/components/dist/components.umd.js"></script>
  </body>
</html>
